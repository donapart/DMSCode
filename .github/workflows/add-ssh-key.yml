name: Add SSH Key to Server (One-time)

on:
  workflow_dispatch:

jobs:
  add-key:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key to server authorized_keys
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.ED25519 }}
          script: |
            echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHbrUxG8eo+hgM+YY+JZ/EPtpgBZfwdhHtky7Vf87Jt7 dano@dmscode" >> ~/.ssh/authorized_keys
            sort -u -o ~/.ssh/authorized_keys ~/.ssh/authorized_keys
            echo "Key added. Current authorized_keys:"
            cat ~/.ssh/authorized_keys
            echo "---"
            echo "System info:"
            uname -a
            hostname
            df -h / 2>/dev/null || true
